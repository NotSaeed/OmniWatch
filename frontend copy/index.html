<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniWatch · AI-SOC</title>
    <!-- When printing from the main window (fallback path), hide all UI except
         any element explicitly marked printable. The PDF export opens its own
         window so this rule is mostly a safety net. -->
    <style>
      @media print {
        body > #root { display: none; }
        .print-target { display: block !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
